<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title> 
    <link rel="stylesheet" href="style.css">
    <script src="main.js"></script>

</head>
 <h1>Candy's Cool Cat Weather App</h1>

<div class="container">
    
   
    <div class = "positon">
        <label for = "zipcode">Enter Zipcode</label>
        <input type = "text" id = "zipcode" placeholder = "Your Zip Code">
        <p></p>
        <button id = "myButton" onclick="zipCodeToGlobal()">Search</button>
        <h2>Position</h2>
        <h3 id = "latitude"></h3>
        <h3 id = "longitude"></h3>
    </div>

    <div id ="cat_image"> 
        <h2></h2>
    </div>
    
    
    <div class = "temp">
        <h2 >Temperature</h2>
        <h4 id="temp"></h4>
        <!-- call javascript function to get temperature data and display it here -->
    </div>

    <div class = "pressure">
        <h2>Pressure</h2>
        <h4 id = "press"></h4>
        <!-- call javascript function to get pressure data and display it here -->
    </div>

    <div class = "humidity">
        <h2>Humidity</h2>
        <h4 id="hum"></h4>
    </div>

    <div class = "wind">
        <h2>Wind Speed</h2>
        <h4 id = "win"> </h4>
    </div>
    
    <div class = "visibility">
        <h2>Visibility</h2>
        <h4 id = "visa"></h4> 
    </div>

    <div class = "sunset"> </div>  
        <h2>Sunset</h2>
        <h4 id = "sunset"></h4>
    </div>

  
</div>
<footer>
    <p>Weather App - Mike Mayer &copy; 2024</p>
</footer>
</html>
